name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '.github/**'
      - '*.md'

  workflow_dispatch:

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6.0.2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3.7.0
      with:
        username: ${{secrets.DOCKER_USERNAME}}
        password: ${{secrets.DOCKER_PASSWORD}}

    - name: Build and Push Docker image
      uses: docker/build-push-action@v6.19.2
      with:
        context: .
        push: true
        tags: ${{secrets.DOCKER_USERNAME}}/pokedex:latest

  deploy-locally:
    needs: build-and-push
    runs-on: self-hosted

    steps:
    - name: Deploy to server 
      run: |
          # Stop container if it works
          docker stop pokedex || true

          # Remove container
          docker rm pokedex || true

          # Pull image
          docker pull ${{secrets.DOCKER_USERNAME}}/pokedex:latest

          # Run container
          docker run -d --name pokedex -p 2102:2102 --restart unless-stopped ${{secrets.DOCKER_USERNAME}}/pokedex:latest
          
        
