name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3.7.0
      with:
        username: ${{secrets.DOCKER_USERNAME}}
        password: ${{secrets.DOCKER_PASSWORD}}

    - name: Build and Push Docker image
      uses: docker/build-push-action@v6.19.2
      with:
        context: .
        push: true
        tags: ${{secrets.DOCKER_USERNAME}}/pokedex:latest

    - name: Deploy to server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{secrets.SERVER_HOST}}
        username: ${{secrets.SERVER_USERNAME}}
        key: ${{secrets.SERVER_SSH_PRIVATE_KEY}}
        script: |

          # Stop container if it works
          docker stop pokedex || true

          # Remove container
          docker rm pokedex || true

          # Pull image
          docker pull ${{secrets.DOCKER_USERNAME}}/pokedex:latest

          # Run container
          docker run -d --name pokedex -p 2103:2103 --restart unless-stopped --env-file .env ${{secrets.DOCKER_USERNAME}}/pokedex:latest
          
        
